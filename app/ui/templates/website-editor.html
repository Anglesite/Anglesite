<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Editor</title>
    <!-- Static SVG icons instead of dynamic Lucide library -->
    <style>
      :root {
        /* Enable native dark mode support */
        color-scheme: light dark;

        /* Light theme colors */
        --bg-primary: #ffffff;
        --bg-secondary: #f8f8f8;
        --bg-tertiary: #f0f0f0;
        --text-primary: #333333;
        --text-secondary: #666666;
        --border-primary: #cccccc;
        --border-secondary: #dddddd;
        --button-bg: #ffffff;
        --button-hover: #f0f0f0;
        --button-active: #e0e0e0;
      }

      /* Dark theme media query for automatic system preference support */
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]) {
          --bg-primary: #1e1e1e;
          --bg-secondary: #252525;
          --bg-tertiary: #2d2d2d;
          --text-primary: #ffffff;
          --text-secondary: #b3b3b3;
          --border-primary: #404040;
          --border-secondary: #353535;
          --button-bg: #2d2d2d;
          --button-hover: #404040;
          --button-active: #4d4d4d;
        }
      }

      :root[data-theme='dark'] {
        --bg-primary: #1e1e1e;
        --bg-secondary: #252525;
        --bg-tertiary: #2d2d2d;
        --text-primary: #ffffff;
        --text-secondary: #b3b3b3;
        --border-primary: #404040;
        --border-secondary: #353535;
        --button-bg: #2d2d2d;
        --button-hover: #404040;
        --button-active: #4d4d4d;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
        display: flex;
      }

      .main-container {
        flex: 1;
        display: flex;
        height: 100vh;
      }

      .content-with-toolbar {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .toolbar {
        background: var(--bg-tertiary);
        border-bottom: 1px solid var(--border-primary);
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
      }

      .left-panel {
        width: 200px;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-primary);
        padding: 8px;
        overflow-y: auto;
      }

      .panel-header {
        background: var(--bg-tertiary);
        border-bottom: 1px solid var(--border-secondary);
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 500;
        text-align: center;
      }

      .panel-content {
        padding: 8px;
        overflow-y: auto;
        height: 100%;
      }

      .center-right-container {
        flex: 1;
        display: flex;
      }

      .center-panel {
        flex: 1;
        background: var(--bg-primary);
      }

      .center-content {
        flex: 1;
        background: var(--bg-primary);
        position: relative;
      }

      .right-panel {
        width: 200px;
        background: var(--bg-secondary);
        border-left: 1px solid var(--border-primary);
      }

      .file-item {
        padding: 4px 8px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
        margin-bottom: 2px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .file-item:hover {
        background: var(--button-hover);
      }

      .file-item i {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .property-item {
        padding: 4px 8px;
        font-size: 12px;
        border-bottom: 1px solid var(--border-secondary);
      }

      .property-label {
        font-weight: 500;
        color: var(--text-secondary);
      }

      .property-value {
        margin-top: 2px;
        color: var(--text-primary);
      }

      .editor-area {
        width: 100%;
        height: 100%;
        border: none;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: monospace;
        font-size: 14px;
        padding: 16px;
        box-sizing: border-box;
        resize: none;
      }

      .preview-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        color: var(--text-secondary);
        font-style: italic;
      }

      /* Ace Editor styles */
      .ace-editor {
        width: 100%;
        height: 100%;
        display: none;
        font-size: 14px;
      }

      .ace-editor.active {
        display: block;
      }

      .preview-placeholder.active {
        display: flex;
      }

      .preview-placeholder:not(.active) {
        display: none;
      }

      /* Sample toolbar buttons */
      .toolbar-button {
        background: var(--button-bg);
        border: 1px solid var(--border-primary);
        border-radius: 3px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 11px;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .toolbar-button:hover {
        background: var(--button-hover);
      }

      .toolbar-button i {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      .toolbar-separator {
        width: 1px;
        height: 20px;
        background: var(--border-primary);
        margin: 0 4px;
      }
    </style>
  </head>

    <script>
      let currentWebsite = null;
      let aceEditor = null;
      let isPreviewMode = true;
      let currentFileContent = '';

      // Initialize simplified website editor when the page loads
      document.addEventListener('DOMContentLoaded', function () {
        // Initialize Lucide icons
        // Static icons - no JavaScript needed

        setupSimplePreviewToggle();
      });

      // Simple preview toggle function
      function setupSimplePreviewToggle() {
        const toggleButton = document.getElementById('preview-edit-toggle');
        const previewPlaceholder = document.getElementById('preview-placeholder');
        const aceEditorDiv = document.getElementById('ace-editor');

        if (!toggleButton || !previewPlaceholder || !aceEditorDiv) {
          return;
        }

        // Start in preview mode
        previewPlaceholder.style.display = 'flex';
        aceEditorDiv.style.display = 'none';
        toggleButton.innerHTML =
          '<svg class="lucide lucide-edit" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg> Edit';

        // Initialize the icon
        // Static icons - no JavaScript needed

        toggleButton.addEventListener('click', function () {
          if (isPreviewMode) {
            // Switch to edit mode
            previewPlaceholder.style.display = 'none';
            aceEditorDiv.style.display = 'block';
            aceEditorDiv.innerHTML =
              "<textarea id=\"simple-editor\" style=\"width: 100%; height: 100%; border: none; font-family: 'Monaco', 'Menlo', 'Consolas', monospace; padding: 15px; resize: none; font-size: 14px; line-height: 1.5; background: var(--bg-primary); color: var(--text-primary); outline: none; box-sizing: border-box;\"># Welcome to Your Website\n\nThis is your website's content. You can edit it here!\n\n## Getting Started\n\n- Edit this markdown content\n- Save your changes\n- Switch back to preview to see the result\n\n**Tip:** Use markdown syntax for formatting!</textarea>";
            toggleButton.innerHTML =
              '<svg class="lucide lucide-eye" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg> Preview';

            // Re-initialize icons after changing
            // Static icons - no JavaScript needed
            isPreviewMode = false;

            // Focus the editor after switching to edit mode
            setTimeout(() => {
              const editor = document.getElementById('simple-editor');
              if (editor) {
                editor.focus();
              }
            }, 100);

            // Hide the WebContentsView (website preview)
            if (window.electronAPI) {
              window.electronAPI.send('website-editor-show-edit');
            }
          } else {
            // Switch to preview mode
            aceEditorDiv.style.display = 'none';
            previewPlaceholder.style.display = 'flex';
            toggleButton.innerHTML =
              '<svg class="lucide lucide-edit" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg> Edit';

            // Re-initialize icons after changing
            // Static icons - no JavaScript needed
            isPreviewMode = true;

            // Show the WebContentsView (website preview)
            if (window.electronAPI) {
              window.electronAPI.send('website-editor-show-preview');
            }
          }
        });
      }

      // Initialize Ace Editor
      function initializeAceEditor() {
        aceEditor = ace.edit('ace-editor');
        aceEditor.setTheme('ace/theme/monokai');
        aceEditor.session.setMode('ace/mode/markdown');
        aceEditor.setOptions({
          fontFamily: 'Monaco, Menlo, monospace',
          fontSize: 14,
          wrap: true,
          showPrintMargin: false,
          enableBasicAutocompletion: true,
          enableLiveAutocompletion: true,
        });

        // Set default content
        aceEditor.setValue(
          `# Welcome to your website

This is a **bold** statement and this is *italic* text.

You can create:
- Lists
- Links
- Images
- And much more!

[Learn more about Markdown](https://www.markdownguide.org/)`,
          -1
        );

        currentFileContent = aceEditor.getValue();
      }

          '<svg class="lucide lucide-folder" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z" /></svg>';

          '<svg class="lucide lucide-code" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/></svg>';
        const settingsIcon =
          '<svg class="lucide lucide-settings" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>';
        const imageIcon =
          '<svg class="lucide lucide-image" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>';
        const fileIcon =
          '<svg class="lucide lucide-file" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14,2 14,8 20,8"/></svg>';

        if (isDirectory) {
          return folderIcon;
        }

        const ext = fileName.split('.').pop().toLowerCase();
        switch (ext) {
          case 'md':
          case 'markdown':
            return fileTextIcon;
          case 'html':
          case 'htm':
          case 'css':
          case 'js':
          case 'ts':
            return codeIcon;
          case 'json':
          case 'yml':
          case 'yaml':
            return settingsIcon;
          case 'png':
          case 'jpg':
          case 'jpeg':
          case 'gif':
          case 'svg':
            return imageIcon;
          default:
            return fileIcon;
        }
      }

      // Function to populate file explorer
      function populateFileExplorer(files) {
        const fileExplorer = document.querySelector('.left-panel');
        fileExplorer.innerHTML = '';

        files.forEach((file) => {
          const fileItem = document.createElement('div');
          fileItem.className = 'file-item';
          fileItem.innerHTML = `
            ${getFileIcon(file.name, file.type === 'directory')}
            ${file.name}
          `;

          fileItem.addEventListener('click', () => {
            console.log('Selected file:', file);
            // TODO: Handle file selection (load content for editing)
          });

          fileExplorer.appendChild(fileItem);
        });

        // Re-initialize icons after adding new content
        // Static icons - no JavaScript needed
      }

      // Function to start dev server and load preview
      async function startDevServerAndPreview(websiteName, websitePath) {
        try {
          console.log('Starting dev server for:', websiteName);
          const serverUrl = await window.electronAPI.invoke('start-website-dev-server', websiteName, websitePath);

          console.log('Dev server started at:', serverUrl);

          // Update placeholder to show we're loading preview
          const placeholder = document.getElementById('preview-placeholder');
          if (placeholder) {
            placeholder.innerHTML = '<p>Loading preview...</p>';
          }

          // Load the homepage in the WebContentsView (with retry logic in main process)
          await window.electronAPI.invoke('load-website-preview', serverUrl);

          // Hide the placeholder once preview is loaded
          if (placeholder) {
            placeholder.style.display = 'none';
          }

          console.log('Preview loaded successfully');
          return serverUrl;
        } catch (error) {
          console.error('Failed to start dev server or load preview:', error);
          // Show error message in placeholder
          const placeholder = document.getElementById('preview-placeholder');
          if (placeholder) {
            placeholder.innerHTML = `
              <div style="text-align: center;">
                <h3>Failed to load preview</h3>
                <p>Error: ${error.message}</p>
                <p><small>Make sure the development server is running</small></p>
              </div>
            `;
          }
        }
      }

      // Listen for website loading from main process
      if (window.electronAPI) {
        window.electronAPI.on('load-website', async (websiteData) => {
          currentWebsite = websiteData;
          console.log('Loading website:', websiteData);

          try {
            // Load website files
            const files = await window.electronAPI.invoke('load-website-files', websiteData.path);
            console.log('Loaded files:', files);
            populateFileExplorer(files);

            // Start dev server and show preview
            await startDevServerAndPreview(websiteData.name, websiteData.path);
          } catch (error) {
            console.error('Failed to load website:', error);
          }
        });
      }
    </script>
  </body>
